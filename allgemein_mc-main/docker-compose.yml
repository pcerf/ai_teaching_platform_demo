version: '3.8'
services:
  ki-quiz-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ID=${APP_ID}
      - APP_TOKEN=${APP_TOKEN}
      - AI_SERVICE_URL=${AI_SERVICE_URL}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL}
      - AUTH_UPSTREAM=${AUTH_UPSTREAM}
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.ki-quiz-test.rule=Host(`ki-quiz-test.hub.lumentic.de`)"
      - "traefik.http.routers.ki-quiz-test.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ki-quiz-test.entrypoints=https"
      - "traefik.http.routers.ki-quiz-test.middlewares=forward-auth@file"
      - "traefik.http.routers.ki-quiz-test.service=ki-quiz-test"
      - "traefik.http.services.ki-quiz-test.loadbalancer.server.port=5000"

networks:
  coolify:
    external: true
