version: '3.8'
services:
  ki-quiz-test2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ID=${APP_ID}
      - APP_TOKEN=${APP_TOKEN}
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.ki-quiz-test2-test.rule=Host(`ki-quiz-test2.hub.lumentic.de`)"
      - "traefik.http.routers.ki-quiz-test2.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ki-quiz-test2.entrypoints=https"
      - "traefik.http.routers.ki-quiz-test2.middlewares=forward-auth@file"
      - "traefik.http.routers.ki-quiz-test2.service=ki-quiz-test2"
      - "traefik.http.services.ki-quiz-test2.loadbalancer.server.port=5000"

networks:
  coolify:
    external: true
