<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lern-Quiz – {{ topic }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0.875rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
    }

    .user-id {
      font-size: 0.75rem;
      color: #64748b;
      background: #f1f5f9;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }

    main {
      flex: 1;
      padding: 2rem 1rem;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .topic-badge {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .progress {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1.75rem;
    }

    .progress-dot {
      flex: 1;
      height: 5px;
      background: #e2e8f0;
      border-radius: 999px;
    }

    .progress-dot.active {
      background: #6366f1;
    }

    .question-card {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .question-number {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6366f1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 0.6rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: #334155;
      font-size: 0.95rem;
    }

    .option-label:hover {
      border-color: #a5b4fc;
      background: #f5f3ff;
    }

    input[type="radio"] {
      accent-color: #6366f1;
      width: 1.1rem;
      height: 1.1rem;
      flex-shrink: 0;
    }

    input[type="radio"]:checked + .option-label,
    .option-label:has(input[type="radio"]:checked) {
      border-color: #6366f1;
      background: #f5f3ff;
    }

    .option-letter {
      font-weight: 700;
      color: #6366f1;
      min-width: 1.2rem;
    }

    .submit-row {
      text-align: center;
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      padding: 0.875rem 2.5rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lern-Quiz</h1>
    <span class="user-id">{{ user_id if user_id else "Gast" }}</span>
  </header>

  <main>
    <div class="topic-badge">📚 {{ topic }}</div>

    <div class="progress" id="progress">
      {% for q in questions %}
      <div class="progress-dot" id="dot-{{ loop.index0 }}"></div>
      {% endfor %}
    </div>

    <form method="post" action="/results" id="quiz-form">
      <input type="hidden" name="topic" value="{{ topic }}" />
      <input type="hidden" name="questions_json" value="{{ questions_json | e }}" />

      {% for q in questions %}
      <div class="question-card">
        <div class="question-number">Frage {{ loop.index }} von {{ questions | length }}</div>
        <div class="question-text">{{ q.question }}</div>
        <div class="options">
          {% for option in q.options %}
          <label class="option-label">
            <input type="radio" name="answer_{{ loop.index0 }}" value="{{ loop.index0 }}"
              onchange="markDot({{ loop.index0 - 1 + (loop.index0 - loop.index0) }})" />
            <span class="option-letter">{{ ['A','B','C','D'][loop.index0] }}</span>
            {{ option }}
          </label>
          {% endfor %}
        </div>
      </div>
      {% endfor %}

      <div class="submit-row">
        <button type="submit">Auswerten →</button>
      </div>
    </form>
  </main>

  <script>
    const letters = ['A','B','C','D'];

    // Fix: attach onchange to radio inputs properly
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const name = radio.getAttribute('name');
        const qIndex = parseInt(name.replace('answer_', ''));
        document.getElementById('dot-' + qIndex).classList.add('active');
      });
    });
  </script>
</body>
</html>
