<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainer – Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .user-id {
      background: rgba(255,255,255,0.15);
      color: #e0e7ff;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.25rem;
    }

    .topic-badge {
      background: rgba(255,255,255,0.15);
      color: #e0e7ff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 640px;
    }

    .question-num {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6d28d9;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1e1b4b;
      margin-bottom: 1.1rem;
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.65rem;
      cursor: pointer;
      font-size: 0.95rem;
      color: #374151;
      transition: border-color 0.15s, background 0.15s;
    }

    .option input[type="radio"] { accent-color: #4338ca; flex-shrink: 0; }
    .option label:hover { border-color: #a5b4fc; background: #f5f3ff; }
    .option:has(input:checked) label { border-color: #4338ca; background: #eef2ff; font-weight: 600; color: #1e1b4b; }

    .submit-area {
      width: 100%;
      max-width: 640px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, #4338ca, #6d28d9);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <header>
    <h1>Trainer</h1>
    {% if user_id %}
    <span class="user-id">{{ user_id }}</span>
    {% endif %}
  </header>

  <main>
    <div class="topic-badge">Thema: {{ topic }}</div>

    <form action="/results" method="post" style="display:contents">
      <input type="hidden" name="questions_json" value="{{ questions_json | e }}" />
      <input type="hidden" name="topic" value="{{ topic | e }}" />

      {% for q in questions %}
      {% set qi = loop.index0 %}
      <div class="card">
        <div class="question-num">Frage {{ loop.index }} von {{ questions | length }}</div>
        <div class="question-text">{{ q.question }}</div>
        <div class="options">
          {% for option in q.options %}
          <div class="option">
            <label>
              <input type="radio" name="answer_{{ qi }}" value="{{ loop.index0 }}" required />
              <span>{{ option }}</span>
            </label>
          </div>
          {% endfor %}
        </div>
      </div>
      {% endfor %}

      <div class="submit-area">
        <button type="submit">Auswerten &rarr;</button>
      </div>
    </form>
  </main>
</body>
</html>
