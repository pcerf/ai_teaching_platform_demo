<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diskurswerkstatt Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
    }

    header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .user-id {
      background: rgba(255,255,255,0.15);
      color: #e0e7ff;
      font-size: 0.8rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 1rem;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4338ca;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #4338ca, #6d28d9);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }

    .hint {
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <header>
    <h1>Diskurswerkstatt Demo</h1>
    {% if user_id %}
    <span class="user-id">{{ user_id }}</span>
    {% endif %}
  </header>

  <main>
    <div class="card">
      <div class="card-icon">🎓</div>
      <h2>Quiz starten</h2>
      <p>Gib ein Thema ein und die KI erstellt&nbsp;5 Multiple-Choice-Fragen für dich.</p>
      <form action="/generate" method="post">
        <div class="input-group">
          <input
            type="text"
            name="topic"
            placeholder="z. B. Photosynthese, Python, Zweiter Weltkrieg …"
            required
            autofocus
          />
          <button type="submit">Quiz generieren &rarr;</button>
        </div>
      </form>
      <p class="hint">Die Fragen werden von einer KI generiert und können Fehler enthalten.</p>
    </div>
  </main>
</body>
</html>
